name: crewmeld

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

# Shared image + build declaration for every service baked from the
# crewmeld monorepo. Declaring `build` on each consumer lets
# `docker compose build crewmeld` (or any sibling) produce the image
# used by setup / migrations / crewmeld.
x-crewmeld-app: &crewmeld-app
  image: proinsight/crewmeld:${VERSION:-latest}
  build:
    context: .
    dockerfile: docker/app.Dockerfile
    args:
      REGISTRY_MIRROR: ${REGISTRY_MIRROR:-}
      NPM_REGISTRY: ${NPM_REGISTRY:-}

services:
  # =============== BASE LAYER ===============

  setup:
    <<: *crewmeld-app
    profiles: [init]
    restart: "no"
    logging: *default-logging
    command: ["bun", "scripts/ensure-secrets.ts"]
    environment:
      - ENV_PATH=/app/.env
    volumes:
      - ./.env:/app/.env

  # Make the host volume root writable by the non-root crewmeld user (uid != 0).
  # The bind source (CREWMELD_BFF_VOLUME_ROOT) is root-owned on first creation;
  # on Windows/macOS Docker Desktop it lives INSIDE the Docker VM and can only be
  # chmod'd from a root container like this — not from the Windows/macOS host.
  # crewmeld depends_on this so Dev Studio can mkdir per-session dirs.
  host-prep:
    image: busybox:1.36
    pull_policy: if_not_present
    restart: "no"
    logging: *default-logging
    volumes:
      - ${CREWMELD_BFF_VOLUME_ROOT:-/data/opensandbox-deploy}:/voldata
    command:
      - /bin/sh
      - -c
      - |
        set -e
        mkdir -p /voldata
        chmod -R 1777 /voldata
        echo "Prepared host volume root (mode 1777)."

  db:
    image: pgvector/pgvector:pg17
    pull_policy: if_not_present
    restart: unless-stopped
    logging: *default-logging
    expose:
      - "5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-crewmeld}
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=C
    volumes:
      - crewmeld_pg_data:/var/lib/postgresql/data
      # init.sql runs ONCE when the data volume is empty. Subsequent
      # `docker compose up` calls see a populated volume and skip this.
      # Only `docker compose down -v` forces re-init on next up.
      - ./packages/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2"

  redis:
    image: redis:7-alpine
    pull_policy: if_not_present
    restart: unless-stopped
    logging: *default-logging
    expose:
      - "6379"
    command: >
      redis-server
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    volumes:
      - crewmeld_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1"

  migrations:
    <<: *crewmeld-app
    restart: "no"
    logging: *default-logging
    command: ["bun", "scripts/run-migrations.ts"]
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-crewmeld}
    volumes:
      - ./packages/db/init.sql:/app/packages/db/init.sql:ro
    depends_on:
      db:
        condition: service_healthy

  crewmeld:
    <<: *crewmeld-app
    # Run as root: the shared session/workspace volume is also written by the
    # (root) OpenSandbox sandbox containers, and Docker auto-creates bind-mount
    # subdirs as root. The image default user (nextjs) then hits EACCES on those
    # root-owned subdirs. Running root keeps ownership uniform across writers.
    user: "0:0"
    restart: unless-stopped
    logging: *default-logging
    # Override the image CMD (`bunx concurrently ...`). bunx fetched
    # concurrently@latest into /tmp at container start — concurrently is a
    # devDependency absent from the production runner image — and a corrupt
    # cache download bricked startup ("Cannot find module '../lib/defaults.js'").
    # This bash supervisor launches both servers with no runtime network
    # dependency: it forwards SIGTERM/SIGINT for graceful `docker stop`, and
    # exits with the first dead child's code so the restart policy recovers the
    # whole container instead of leaving it half-up.
    command:
      - bash
      - -c
      - |
        bun apps/crewmeld/server.js &
        app=$$!
        bun apps/crewmeld/socket-bundled.js &
        sock=$$!
        trap 'kill -TERM $$app $$sock 2>/dev/null' TERM INT
        wait -n
        code=$$?
        kill -TERM $$app $$sock 2>/dev/null
        wait
        exit $$code
    # Reach a host-run OpenSandbox server (and host-published MinIO) at
    # host.docker.internal. Docker Desktop resolves this automatically; the
    # host-gateway mapping makes it work on Linux engines too (miniStart points
    # OPENSANDBOX_SERVER_URL / MINIO_EXTERNAL_ENDPOINT there).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${APP_PORT:-6100}:6100"
      - "${SOCKET_PORT:-6102}:6102"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-crewmeld}
      - REDIS_URL=redis://redis:6379
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:6100}
      - BETTER_AUTH_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:6100}
      - APP_BASE_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:6100}
      - SOCKET_SERVER_URL=http://127.0.0.1:6102
      - NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:6100}
      - RAGFLOW_URL=${RAGFLOW_URL:-http://ragflow:9380}
      - OLLAMA_URL=${OLLAMA_URL:-}
    volumes:
      - crewmeld_k3s_shared:/shared
      # Dev Studio fresh-sandbox: extracted tool code + shared pip libs cache.
      # Must be a bind mount (not a named volume) so the host daemon can re-bind
      # these real paths into the sandbox containers it spawns (DooD).
      - ${CREWMELD_BFF_VOLUME_ROOT:-/data/opensandbox-deploy}:${CREWMELD_BFF_VOLUME_ROOT:-/data/opensandbox-deploy}
    depends_on:
      # Ensure the volume root is world-writable before the non-root app starts.
      host-prep:
        condition: service_completed_successfully
      migrations:
        condition: service_completed_successfully
      # Optional: when --profile opensandbox-docker is active, wait for the
      # OpenSandbox server to start before crewmeld (which reaches it at
      # http://opensandbox-server:30080). required: false keeps plain
      # `docker compose up` working without the profile.
      opensandbox-server:
        condition: service_started
        required: false
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:6100/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "4"

  # =============== PROFILE: opensandbox ===============
  # OpenSandbox (alibaba/OpenSandbox) sandbox-execution runtime on a dedicated
  # k3s node. The OpenSandbox server itself is NOT a compose service — it is
  # installed INTO this k3s via helm (see the opensandbox-deploy dir's
  # install-existing-*.sh) and exposed on NodePort 30080. crewmeld reaches it
  # through OPENSANDBOX_SERVER_URL (set in .env), so there is no compose-level
  # dependency between this service and the crewmeld app.
  #
  # Dependency files (registries.yaml / shared-libs / sandbox-data) live in the
  # opensandbox-deploy directory, which defaults to a sibling of this repo.
  # Override OPENSANDBOX_DEPLOY_DIR in .env if it lives elsewhere.
  opensandbox-k3s:
    image: rancher/k3s:v1.33.0-k3s1
    pull_policy: if_not_present
    profiles: [opensandbox]
    container_name: opensandbox-k3s
    restart: unless-stopped
    logging: *default-logging
    privileged: true
    hostname: opensandbox-k3s
    command:
      - server
      - --disable=traefik
      - --disable=servicelb
      - --disable=metrics-server
      - --tls-san=127.0.0.1
      - --tls-san=localhost
      - --node-name=opensandbox-k3s
      - --write-kubeconfig-mode=644
    environment:
      - K3S_KUBECONFIG_OUTPUT=/output/config
      - K3S_KUBECONFIG_MODE=644
    tmpfs:
      - /run
      - /var/run
    ports:
      - "6443:6443"
      - "30000-32767:30000-32767"
    volumes:
      # Fresh named volume (v2): the original crewmeld_opensandbox_k3s_data left
      # stale CNI/route state on disk that drove a "no default routes" restart
      # loop. A clean volume gives k3s a pristine datastore on first boot.
      - crewmeld_opensandbox_k3s_v2:/var/lib/rancher/k3s
      - ${OPENSANDBOX_DEPLOY_DIR:-../opensandbox-deploy}/.kube:/output
      - ${OPENSANDBOX_DEPLOY_DIR:-../opensandbox-deploy}/registries.yaml:/etc/rancher/k3s/registries.yaml:ro
      # Bundled-mode persistence for sandbox hostPath mounts.
      # k3s sees /data/opensandbox-deploy/{shared-libs,sandbox-data}; they are
      # bind-mounted from the deploy dir so the data lives next to the install
      # scripts (easy to inspect / backup / wipe).
      - ${OPENSANDBOX_DEPLOY_DIR:-../opensandbox-deploy}/shared-libs:/data/opensandbox-deploy/shared-libs
      - ${OPENSANDBOX_DEPLOY_DIR:-../opensandbox-deploy}/sandbox-data:/data/opensandbox-deploy/sandbox-data
    healthcheck:
      test:
        - CMD-SHELL
        - test -f /output/config && kubectl get nodes --no-headers 2>/dev/null | grep -q ' Ready'
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s

  # =============== PROFILE: opensandbox-docker ===============
  # OpenSandbox "docker" runtime mode (see .sandbox.toml: [runtime] type="docker").
  # The server runs containerized here and spawns sandbox containers (execd /
  # egress / base image) via the HOST Docker daemon (docker-out-of-docker).
  # Three pieces, all under --profile opensandbox-docker:
  #   opensandbox-config  one-shot: renders /etc/opensandbox/config.toml from the
  #                       committed template .sandbox.toml.example, substituting
  #                       CREWMELD_SANDBOX_VOLUME_ROOT + OPENSANDBOX_API_KEY
  #   opensandbox-images  one-shot: pre-pulls the images the server will spawn
  #   opensandbox-server  the server. crewmeld reaches it via the compose network
  #                       at OPENSANDBOX_SERVER_URL=http://opensandbox-server:30080
  # CREWMELD_SANDBOX_VOLUME_ROOT must be a HOST path: it is bind-mounted into the
  # server at the IDENTICAL path so bind mounts the server asks the host daemon to
  # create resolve on both sides, and it is the allowed_host_paths allowlist.
  opensandbox-config:
    image: busybox:1.36
    pull_policy: if_not_present
    profiles: [opensandbox-docker]
    restart: "no"
    logging: *default-logging
    environment:
      - CREWMELD_SANDBOX_VOLUME_ROOT=${CREWMELD_SANDBOX_VOLUME_ROOT:-/data/opensandbox-deploy}
      - OPENSANDBOX_API_KEY=${OPENSANDBOX_API_KEY:-}
    volumes:
      - ./.sandbox.toml.example:/template/.sandbox.toml:ro
      - crewmeld_opensandbox_config:/etc/opensandbox
    command:
      - /bin/sh
      - -c
      - |
        set -e
        sed -e "s#\$${CREWMELD_SANDBOX_VOLUME_ROOT}#$${CREWMELD_SANDBOX_VOLUME_ROOT}#g" \
            -e "s#\$${OPENSANDBOX_API_KEY}#$${OPENSANDBOX_API_KEY}#g" \
          /template/.sandbox.toml > /etc/opensandbox/config.toml
        echo "Rendered /etc/opensandbox/config.toml (volume root: $${CREWMELD_SANDBOX_VOLUME_ROOT})"

  opensandbox-images:
    image: docker:cli
    pull_policy: if_not_present
    profiles: [opensandbox-docker]
    restart: "no"
    logging: *default-logging
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        for img in \
          ${OPENSANDBOX_EXECD_IMAGE:-opensandbox/execd:v1.0.16} \
          ${OPENSANDBOX_EGRESS_IMAGE:-opensandbox/egress:v1.0.12} \
          ${OPENSANDBOX_BASE_IMAGE:-python:3.12-slim} \
          ${CREWMELD_SANDBOX_IMAGE:-proinsight/crewmeld-coder:latest}; do
          echo "pulling $$img"
          docker pull "$$img"
        done
        echo "OpenSandbox docker-mode images ready."

  opensandbox-server:
    image: ${OPENSANDBOX_SERVER_IMAGE:-opensandbox/server:v0.1.14}
    pull_policy: if_not_present
    profiles: [opensandbox-docker]
    restart: unless-stopped
    logging: *default-logging
    # Load the rendered docker-runtime config explicitly via --config (matches the
    # upstream helm chart). Without this the server falls back to its built-in
    # default (kubernetes runtime) and crashes looking for a kubeconfig.
    command: ["--config", "/etc/opensandbox/config.toml"]
    environment:
      - SANDBOX_CONFIG_PATH=/etc/opensandbox/config.toml
    ports:
      - "${OPENSANDBOX_PORT:-30080}:30080"
    volumes:
      # docker-out-of-docker: the server drives the HOST daemon to spawn sandboxes.
      - /var/run/docker.sock:/var/run/docker.sock
      # Rendered config (written by opensandbox-config).
      - crewmeld_opensandbox_config:/etc/opensandbox:ro
      # Home volume holds the sqlite store (~/.opensandbox).
      - crewmeld_opensandbox_home:/root
      # Volume root mounted at the identical host path (see section comment).
      - ${CREWMELD_SANDBOX_VOLUME_ROOT:-/data/opensandbox-deploy}:${CREWMELD_SANDBOX_VOLUME_ROOT:-/data/opensandbox-deploy}
    depends_on:
      opensandbox-config:
        condition: service_completed_successfully
      opensandbox-images:
        condition: service_completed_successfully

  # Attach opensandbox-server to the legacy `bridge` network so it can reach the
  # sandboxes it spawns (OpenSandbox only supports network_mode bridge/host/none,
  # so sandboxes live on `bridge`; the server lives on crewmeld-network for the
  # crewmeld<->server hop). compose can't add a service to `bridge` (network-scoped
  # aliases are unsupported there), so we use `docker network connect` which adds
  # no alias. Idempotent; re-runs on every recreate.
  opensandbox-net-bridge:
    image: docker:cli
    pull_policy: if_not_present
    profiles: [opensandbox-docker]
    restart: "no"
    logging: *default-logging
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      opensandbox-server:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        sid=$$(docker ps -q -f label=com.docker.compose.project=crewmeld -f label=com.docker.compose.service=opensandbox-server)
        if [ -n "$$sid" ]; then
          docker network connect bridge "$$sid" 2>/dev/null || true
          echo "opensandbox-server ($$sid) connected to bridge"
        else
          echo "opensandbox-server container not found; skipping bridge connect" >&2
        fi

  # =============== PROFILE: minio ===============

  minio:
    image: minio/minio
    pull_policy: if_not_present
    profiles: [minio]
    restart: unless-stopped
    logging: *default-logging
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-rag_flow}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-infini_rag_flow}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - crewmeld_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  minio-init:
    image: minio/mc
    pull_policy: if_not_present
    profiles: [minio]
    restart: "no"
    logging: *default-logging
    depends_on:
      minio:
        condition: service_started
    environment:
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-rag_flow}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-infini_rag_flow}
      - MINIO_BUCKET=${MINIO_BUCKET:-tool-files}
    entrypoint: >
      /bin/sh -c "
      set -e;
      until mc alias set local http://minio:9000 \"$$MINIO_ACCESS_KEY\" \"$$MINIO_SECRET_KEY\"; do echo waiting...; sleep 2; done;
      mc mb --ignore-existing local/$$MINIO_BUCKET;
      mc anonymous set download local/$$MINIO_BUCKET;
      echo 'MinIO bucket ready.'
      "

  # =============== PROFILE: ragflow ===============
  # Full RAGFlow knowledge-base engine stack (ES + MySQL + Valkey + RAGFlow)
  # Memory requirement: additional ~8-12GB (ES 2G + MySQL 1G + RAGFlow 4-8G)
  # Recommended host total memory >= 16GB

  ragflow-es:
    image: elasticsearch:8.11.3
    pull_policy: if_not_present
    profiles: [ragflow]
    restart: unless-stopped
    logging: *default-logging
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    volumes:
      - crewmeld_ragflow_es_data:/usr/share/elasticsearch/data
    expose:
      - "9200"
    networks:
      default:
        aliases:
          - es01
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2"

  ragflow-mysql:
    image: mysql:8.0.39
    pull_policy: if_not_present
    profiles: [ragflow]
    restart: unless-stopped
    logging: *default-logging
    environment:
      - MYSQL_ROOT_PASSWORD=infini_rag_flow
      - MYSQL_DATABASE=rag_flow
    command: --max-connections=1000 --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - crewmeld_ragflow_mysql_data:/var/lib/mysql
    expose:
      - "3306"
    networks:
      default:
        aliases:
          - mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pinfini_rag_flow"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1"

  ragflow-redis:
    image: valkey/valkey:8
    pull_policy: if_not_present
    profiles: [ragflow]
    restart: unless-stopped
    logging: *default-logging
    command: valkey-server --requirepass infini_rag_flow --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - crewmeld_ragflow_redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli -a infini_rag_flow ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  ragflow:
    image: ${RAGFLOW_IMAGE:-infiniflow/ragflow:v0.23.1}
    pull_policy: if_not_present
    profiles: [ragflow]
    restart: unless-stopped
    logging: *default-logging
    environment:
      - RAGFLOW_HOST=0.0.0.0
      - RAGFLOW_HTTP_PORT=9380
      - SVR_HTTP_PORT=9380
      - TZ=Asia/Shanghai
      # Elasticsearch
      - DOC_ENGINE=elasticsearch
      - ES_HOST=ragflow-es
      - ES_PORT=9200
      - ELASTIC_PASSWORD=
      # MySQL
      - MYSQL_HOST=ragflow-mysql
      - MYSQL_PORT=3306
      - MYSQL_PASSWORD=infini_rag_flow
      - MYSQL_DBNAME=rag_flow
      # Redis (RAGFlow-specific, not shared with crewmeld's redis)
      - REDIS_HOST=ragflow-redis:6379
      - REDIS_PASSWORD=infini_rag_flow
      - REDIS_DB=1
      # MinIO (optional: shared with --profile minio; if not enabled RAGFlow uses local storage)
      - MINIO_HOST=${RAGFLOW_MINIO_HOST:-minio}
      - MINIO_PORT=9000
      - MINIO_USER=${MINIO_ACCESS_KEY:-rag_flow}
      - MINIO_PASSWORD=${MINIO_SECRET_KEY:-infini_rag_flow}
    volumes:
      - crewmeld_ragflow_data:/ragflow/data
      - ./docker/ragflow-nginx.conf:/etc/nginx/sites-enabled/default:ro
    ports:
      - "${RAGFLOW_PORT:-9380}:80"
      - "${RAGFLOW_API_PORT:-19380}:9380"
    depends_on:
      ragflow-es:
        condition: service_healthy
      ragflow-mysql:
        condition: service_healthy
      ragflow-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9380/api/v1/datasets?page=1&page_size=1 -H 'Authorization: Bearer dummy' || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: ${RAGFLOW_MEMORY_LIMIT:-8G}
          cpus: "4"

  # =============== PROFILE: ollama / ollama-cpu ===============
  # Local LLM via Ollama. Two variants (mutually exclusive — pick one):
  #   --profile ollama      → NVIDIA GPU (needs nvidia-container-toolkit)
  #   --profile ollama-cpu  → CPU-only
  # Optional: --profile ollama-setup  → one-shot pull of gemma4:e2b (smallest Gemma 4, multimodal)
  ollama:
    image: ollama/ollama:latest
    pull_policy: if_not_present
    profiles: [ollama]
    logging: *default-logging
    volumes:
      - crewmeld_ollama_data:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    environment:
      - NVIDIA_DRIVER_CAPABILITIES=all
      - OLLAMA_LOAD_TIMEOUT=-1
      - OLLAMA_KEEP_ALIVE=-1
      - OLLAMA_DEBUG=1
      - OLLAMA_HOST=0.0.0.0:11434
    command: serve
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  ollama-cpu:
    image: ollama/ollama:latest
    pull_policy: if_not_present
    profiles: [ollama-cpu]
    logging: *default-logging
    volumes:
      - crewmeld_ollama_data:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    environment:
      - OLLAMA_LOAD_TIMEOUT=-1
      - OLLAMA_KEEP_ALIVE=-1
      - OLLAMA_DEBUG=1
      - OLLAMA_HOST=0.0.0.0:11434
    command: serve
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    # Expose as `ollama` hostname so crewmeld app uses OLLAMA_URL=http://ollama:11434
    # regardless of which profile the user picked.
    networks:
      default:
        aliases:
          - ollama

  model-setup:
    image: ollama/ollama:latest
    pull_policy: if_not_present
    profiles: [ollama-setup]
    logging: *default-logging
    volumes:
      - crewmeld_ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=ollama:11434
    entrypoint: ["/bin/sh", "-lc"]
    command: >
      sh -c "
        echo 'Waiting for Ollama...' &&
        until ollama list >/dev/null 2>&1; do sleep 2; done &&
        echo 'Pulling gemma4:e2b (Gemma 4 effective-2B, multimodal ~7.2GB)...' &&
        ollama pull gemma4:e2b &&
        echo 'Done. To pull more: docker compose exec ollama ollama pull <name>'
      "
    restart: "no"

volumes:
  crewmeld_pg_data:
  crewmeld_redis_data:
  crewmeld_k3s_shared:
  crewmeld_opensandbox_k3s_v2:
  crewmeld_opensandbox_config:
  crewmeld_opensandbox_home:
  crewmeld_minio_data:
  crewmeld_ragflow_data:
  crewmeld_ragflow_es_data:
  crewmeld_ragflow_mysql_data:
  crewmeld_ragflow_redis_data:
  crewmeld_ollama_data:

networks:
  default:
    name: crewmeld-network
